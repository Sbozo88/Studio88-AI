#:schema https://developers.cloudflare.com/workers/wrangler/configuration-schema/

name = "studio88-ai"
compatibility_date = "2024-03-18"

[assets]
directory = "."
binding = "ASSETS"

# Exclude large and unnecessary files from the upload
exclude = [
  "node_modules/**",
  ".git/**",
  ".agent/**",
  "package.json",
  "package-lock.json",
  "wrangler.toml",
  ".gitignore",
  ".pagesignore",
  "*.md"
]
